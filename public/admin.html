<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-3xl font-bold text-gray-800 mb-8">
                📊 URL Shortener Admin Dashboard
            </h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-lg shadow p-6">
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">Total URLs</h3>
                    <p class="text-3xl font-bold text-blue-600" id="totalUrls">0</p>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">Total Clicks</h3>
                    <p class="text-3xl font-bold text-green-600" id="totalClicks">0</p>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">Avg Clicks/URL</h3>
                    <p class="text-3xl font-bold text-purple-600" id="avgClicks">0</p>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold text-gray-800">All URLs</h2>
                    <button onclick="refreshData()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
                        🔄 Refresh
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="min-w-full table-auto">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="px-4 py-2 text-left text-sm font-medium text-gray-700">Short Code</th>
                                <th class="px-4 py-2 text-left text-sm font-medium text-gray-700">Original URL</th>
                                <th class="px-4 py-2 text-left text-sm font-medium text-gray-700">Short URL</th>
                                <th class="px-4 py-2 text-left text-sm font-medium text-gray-700">Clicks</th>
                                <th class="px-4 py-2 text-left text-sm font-medium text-gray-700">Created</th>
                                <th class="px-4 py-2 text-left text-sm font-medium text-gray-700">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="urlsTableBody" class="divide-y divide-gray-200">
                            <!-- Data will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchAllUrls() {
            try {
                // Since we don't have a direct endpoint, we'll create one
                const response = await fetch('/api/admin/all-urls');
                const urls = await response.json();
                return urls;
            } catch (error) {
                console.error('Error fetching URLs:', error);
                return [];
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        function truncateUrl(url, maxLength = 50) {
            return url.length > maxLength ? url.substring(0, maxLength) + '...' : url;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                button.classList.add('bg-green-600');
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('bg-green-600');
                }, 2000);
            });
        }

        async function refreshData() {
            const urls = await fetchAllUrls();
            const tbody = document.getElementById('urlsTableBody');
            const totalUrlsEl = document.getElementById('totalUrls');
            const totalClicksEl = document.getElementById('totalClicks');
            const avgClicksEl = document.getElementById('avgClicks');

            if (urls.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">No URLs found. The database is empty.</td></tr>';
                totalUrlsEl.textContent = '0';
                totalClicksEl.textContent = '0';
                avgClicksEl.textContent = '0';
                return;
            }

            const totalClicks = urls.reduce((sum, url) => sum + url.clicks, 0);
            const avgClicks = (totalClicks / urls.length).toFixed(1);

            totalUrlsEl.textContent = urls.length;
            totalClicksEl.textContent = totalClicks;
            avgClicksEl.textContent = avgClicks;

            tbody.innerHTML = urls.map(url => `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-sm">
                        <span class="font-mono bg-gray-100 px-2 py-1 rounded">${url.short_code}</span>
                    </td>
                    <td class="px-4 py-3 text-sm">
                        <a href="${url.original_url}" target="_blank" class="text-blue-600 hover:underline" title="${url.original_url}">
                            ${truncateUrl(url.original_url)}
                        </a>
                    </td>
                    <td class="px-4 py-3 text-sm">
                        <div class="flex items-center gap-2">
                            <span class="font-mono text-xs bg-blue-100 px-2 py-1 rounded">${window.location.origin}/${url.short_code}</span>
                            <button onclick="copyToClipboard('${window.location.origin}/${url.short_code}')" class="text-xs px-2 py-1 bg-gray-200 rounded hover:bg-gray-300">
                                📋
                            </button>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-sm">
                        <span class="font-semibold ${url.clicks > 0 ? 'text-green-600' : 'text-gray-400'}">${url.clicks}</span>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600">
                        ${formatDate(url.created_at)}
                    </td>
                    <td class="px-4 py-3 text-sm">
                        <button onclick="window.open('/api/stats/${url.short_code}', '_blank')" class="text-xs px-2 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200">
                            📊 Stats
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);

        // Initial load
        refreshData();
    </script>
</body>
</html>
